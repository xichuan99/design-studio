name: SmartDesign Studio CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: cicd-main
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/clarinovist/design-studio-backend
  FRONTEND_IMAGE: ghcr.io/clarinovist/design-studio-frontend
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ─────────────────────────────────────────────
# Job 1a: Backend Tests + Lint (Python)
# ─────────────────────────────────────────────
jobs:
  changes:
    name: "🧭 Detect Changed Areas"
    runs-on: ubuntu-latest
    outputs:
      backend_changed: ${{ steps.detect.outputs.backend_changed }}
      frontend_changed: ${{ steps.detect.outputs.frontend_changed }}
      any_changed: ${{ steps.detect.outputs.any_changed }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Detect file changes
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          backend_changed=false
          frontend_changed=false
          infra_changed=false

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_ref="${{ github.base_ref }}"
            git fetch --no-tags origin "$base_ref"
            changed_files="$(git diff --name-only "origin/$base_ref...${{ github.sha }}")"
          else
            before_sha="${{ github.event.before }}"
            if [[ -n "$before_sha" && "$before_sha" != "0000000000000000000000000000000000000000" ]]; then
              changed_files="$(git diff --name-only "$before_sha...${{ github.sha }}")"
            else
              changed_files="$(git show --pretty='' --name-only "${{ github.sha }}")"
            fi
          fi

          echo "Changed files:"
          echo "$changed_files"

          while IFS= read -r file; do
            [[ -z "$file" ]] && continue
            case "$file" in
              backend/*) backend_changed=true ;;
              frontend/*) frontend_changed=true ;;
              .github/workflows/*|docker-compose.yml|release-please-config.json|.release-please-manifest.json|VERSION)
                infra_changed=true
                ;;
            esac
          done <<< "$changed_files"

          if [[ "$infra_changed" == "true" ]]; then
            backend_changed=true
            frontend_changed=true
          fi

          any_changed=false
          if [[ "$backend_changed" == "true" || "$frontend_changed" == "true" ]]; then
            any_changed=true
          fi

          echo "backend_changed=$backend_changed" >> "$GITHUB_OUTPUT"
          echo "frontend_changed=$frontend_changed" >> "$GITHUB_OUTPUT"
          echo "any_changed=$any_changed" >> "$GITHUB_OUTPUT"

  test-backend:
    name: "🐍 Backend Tests & Lint"
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.backend_changed == 'true'

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: designstudio
          POSTGRES_USER: dev
          POSTGRES_PASSWORD: devpass
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://dev:devpass@localhost:5433/designstudio
      REDIS_URL: redis://localhost:6380/0
      NEXTAUTH_SECRET: test-secret-for-ci
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      FAL_KEY: ${{ secrets.FAL_KEY }}
      S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
      S3_BUCKET: ${{ secrets.S3_BUCKET }}
      S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
      S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
      S3_PUBLIC_URL: ${{ secrets.S3_PUBLIC_URL }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python 3.10
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: "backend/requirements.txt"

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Lint with Ruff
        run: |
          pip install ruff
          ruff check backend/app backend/tests

      - name: Run Migrations & Seed
        run: |
          cd backend
          alembic upgrade head
          python -m scripts.seed_templates

      - name: Pytest — Backend
        run: cd backend && pytest tests/ -v --tb=short

# ─────────────────────────────────────────────
# Job 1b: Frontend Lint + Build (Node) — runs in PARALLEL with 1a
# ─────────────────────────────────────────────
  test-frontend:
    name: "⚛️ Frontend Lint & Build"
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.frontend_changed == 'true'

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node.js 24
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Install dependencies
        run: cd frontend && npm ci --legacy-peer-deps

      - name: ESLint
        run: cd frontend && npm run lint

      - name: Type Check & Build
        run: cd frontend && npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api
          NEXTAUTH_SECRET: test-secret-for-ci
          NEXTAUTH_URL: http://localhost:3000

# ─────────────────────────────────────────────
# Job 2: Build & Push Docker Images (parallel per service)
# Hanya jalan jika push ke main dan kedua test lulus
# ─────────────────────────────────────────────
  build-backend:
    name: "🐳 Build Backend"
    runs-on: ubuntu-latest
    needs: [changes, test-backend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.changes.outputs.backend_changed == 'true'
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Login to GHCR (with retry)
        shell: bash
        run: |
          for i in 1 2 3; do
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin && exit 0
            echo "Login attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "All login attempts failed"
          exit 1
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  build-frontend:
    name: "🎨 Build Frontend"
    runs-on: ubuntu-latest
    needs: [changes, test-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.changes.outputs.frontend_changed == 'true'
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Login to GHCR (with retry)
        shell: bash
        run: |
          for i in 1 2 3; do
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin && exit 0
            echo "Login attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "All login attempts failed"
          exit 1
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_BUILD_ID=${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

# ─────────────────────────────────────────────
# Job 3: Deploy ke VPS (setelah semua image siap)
# ─────────────────────────────────────────────
  deploy:
    name: "🚀 Deploy ke VPS"
    runs-on: ubuntu-latest
    needs: [changes, build-backend, build-frontend]
    if: >-
      always() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.changes.outputs.any_changed == 'true' &&
      (needs.build-backend.result == 'success' || needs.build-backend.result == 'skipped') &&
      (needs.build-frontend.result == 'success' || needs.build-frontend.result == 'skipped')

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Deploy via SSH
        uses: appleboy/ssh-action@029f5b4aeeeb58fdfe1410a5d17f967dacf36262
        env:
          BACKEND_CHANGED: ${{ needs.changes.outputs.backend_changed }}
          FRONTEND_CHANGED: ${{ needs.changes.outputs.frontend_changed }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ~/design-studio

            BACKEND_TAG="latest"
            FRONTEND_TAG="latest"

            if [ "${BACKEND_CHANGED}" = "true" ]; then
              BACKEND_TAG="${{ github.sha }}"
            fi
            if [ "${FRONTEND_CHANGED}" = "true" ]; then
              FRONTEND_TAG="${{ github.sha }}"
            fi

            BACKEND_IMAGE_REF="${{ env.BACKEND_IMAGE }}:${BACKEND_TAG}"
            FRONTEND_IMAGE_REF="${{ env.FRONTEND_IMAGE }}:${FRONTEND_TAG}"
            
            # Reset perubahan lokal apapun termasuk docker-compose.yml
            git reset --hard HEAD
            
            # Tarik perubahan terbaru dari repository
            git pull origin main

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin 2>/dev/null

            BACKEND_IMAGE="$BACKEND_IMAGE_REF" \
            FRONTEND_IMAGE="$FRONTEND_IMAGE_REF" \
              docker compose pull backend frontend celery

            NEXTAUTH_SECRET="${{ secrets.NEXTAUTH_SECRET }}" \
            NEXTAUTH_URL="${{ secrets.NEXTAUTH_URL }}" \
            GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}" \
            GOOGLE_CLIENT_SECRET="${{ secrets.GOOGLE_CLIENT_SECRET }}" \
            BACKEND_IMAGE="$BACKEND_IMAGE_REF" \
            FRONTEND_IMAGE="$FRONTEND_IMAGE_REF" \
              docker compose up -d --remove-orphans

            docker compose exec -T backend alembic upgrade head
            docker compose exec -T backend python -m scripts.seed_templates

            echo "✅ Deploy selesai! Commit: ${{ github.sha }}"
