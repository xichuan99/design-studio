name: SmartDesign Studio CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: cicd-main
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/clarinovist/design-studio-backend
  FRONTEND_IMAGE: ghcr.io/clarinovist/design-studio-frontend
  QUANTUM_IMAGE: ghcr.io/clarinovist/design-studio-quantum
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ─────────────────────────────────────────────
# Job 1a: Backend Tests + Lint (Python)
# ─────────────────────────────────────────────
jobs:
  test-backend:
    name: "🐍 Backend Tests & Lint"
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: designstudio
          POSTGRES_USER: dev
          POSTGRES_PASSWORD: devpass
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://dev:devpass@localhost:5433/designstudio
      REDIS_URL: redis://localhost:6380/0
      NEXTAUTH_SECRET: test-secret-for-ci
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      FAL_KEY: ${{ secrets.FAL_KEY }}
      S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
      S3_BUCKET: ${{ secrets.S3_BUCKET }}
      S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
      S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
      S3_PUBLIC_URL: ${{ secrets.S3_PUBLIC_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: "backend/requirements.txt"

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Lint with Ruff
        run: |
          pip install ruff
          ruff check backend/app --select W291,W293,F841 --ignore E501

      - name: Run Migrations & Seed
        run: |
          cd backend
          alembic upgrade head
          python -m scripts.seed_templates

      - name: Pytest — Backend
        run: cd backend && pytest tests/ -v --tb=short

      - name: Pytest — Quantum Engine
        run: |
          cd quantum-engine
          python -m pip install -r requirements.txt
          pytest tests/ -v --tb=short

# ─────────────────────────────────────────────
# Job 1b: Frontend Lint + Build (Node) — runs in PARALLEL with 1a
# ─────────────────────────────────────────────
  test-frontend:
    name: "⚛️ Frontend Lint & Build"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Install dependencies
        run: cd frontend && npm ci --legacy-peer-deps

      - name: ESLint
        run: cd frontend && npm run lint

      - name: Type Check & Build
        run: cd frontend && npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api
          NEXTAUTH_SECRET: test-secret-for-ci
          NEXTAUTH_URL: http://localhost:3000

# ─────────────────────────────────────────────
# Job 2: Build & Push Docker Images (parallel per service)
# Hanya jalan jika push ke main dan kedua test lulus
# ─────────────────────────────────────────────
  build-backend:
    name: "🐳 Build Backend"
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  build-quantum:
    name: "⚛️ Build Quantum Engine"
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ./quantum-engine
          file: ./quantum-engine/Dockerfile
          push: true
          tags: |
            ${{ env.QUANTUM_IMAGE }}:latest
            ${{ env.QUANTUM_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=quantum
          cache-to: type=gha,mode=max,scope=quantum

  build-frontend:
    name: "🎨 Build Frontend"
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_BUILD_ID=${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

# ─────────────────────────────────────────────
# Job 3: Deploy ke VPS (setelah semua image siap)
# ─────────────────────────────────────────────
  deploy:
    name: "🚀 Deploy ke VPS"
    runs-on: ubuntu-latest
    needs: [build-backend, build-quantum, build-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ~/design-studio
            
            # Reset perubahan lokal apapun termasuk docker-compose.yml
            git reset --hard HEAD
            
            # Tarik perubahan terbaru dari repository
            git pull origin main

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin 2>/dev/null

            BACKEND_IMAGE=${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
            FRONTEND_IMAGE=${{ env.FRONTEND_IMAGE }}:${{ github.sha }} \
            QUANTUM_IMAGE=${{ env.QUANTUM_IMAGE }}:${{ github.sha }} \
              docker compose pull backend frontend celery quantum-engine

            NEXTAUTH_SECRET="${{ secrets.NEXTAUTH_SECRET }}" \
            NEXTAUTH_URL="${{ secrets.NEXTAUTH_URL }}" \
            GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}" \
            GOOGLE_CLIENT_SECRET="${{ secrets.GOOGLE_CLIENT_SECRET }}" \
            BACKEND_IMAGE=${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
            FRONTEND_IMAGE=${{ env.FRONTEND_IMAGE }}:${{ github.sha }} \
            QUANTUM_IMAGE=${{ env.QUANTUM_IMAGE }}:${{ github.sha }} \
              docker compose up -d --remove-orphans

            docker compose exec -T backend alembic upgrade head

            echo "✅ Deploy selesai! Commit: ${{ github.sha }}"

# ─────────────────────────────────────────────
# Job 4: Release Please
# ─────────────────────────────────────────────
  release-please:
    name: "📦 Release Please"
    runs-on: ubuntu-latest
    needs: [deploy]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
