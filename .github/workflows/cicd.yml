name: SmartDesign Studio CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# Hanya satu deployment berjalan sekaligus untuk branch main
concurrency:
  group: cicd-main
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/clarinovist/design-studio-backend
  FRONTEND_IMAGE: ghcr.io/clarinovist/design-studio-frontend
  # Silence the Node 20 deprecation warnings by forcing Node 24
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────────
  # 1. Automated Tests (Backend & Frontend)
  # ─────────────────────────────────────────────
  test:
    name: Run Tests & Lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: designstudio
          POSTGRES_USER: dev
          POSTGRES_PASSWORD: devpass
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://dev:devpass@localhost:5433/designstudio
      REDIS_URL: redis://localhost:6380/0
      NEXTAUTH_SECRET: test-secret-for-ci
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      FAL_KEY: ${{ secrets.FAL_KEY }}
      S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
      S3_BUCKET: ${{ secrets.S3_BUCKET }}
      S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
      S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
      S3_PUBLIC_URL: ${{ secrets.S3_PUBLIC_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: "backend/requirements.txt"

      - name: Install backend dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint backend with ruff
        run: |
          pip install ruff
          ruff check backend/app --select W291,W293,F841 --ignore E501

      - name: Run Migrations & Seed
        run: |
          cd backend
          alembic upgrade head
          python -m scripts.seed_templates

      - name: Run Pytest
        run: |
          cd backend
          pytest tests/ -v --tb=short

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci --legacy-peer-deps

      - name: Lint frontend
        run: |
          cd frontend
          npm run lint

      - name: Type Check & Build frontend
        run: |
          cd frontend
          npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api
          NEXTAUTH_SECRET: test-secret-for-ci
          NEXTAUTH_URL: http://localhost:3000

  # ─────────────────────────────────────────────
  # 2. Build & Push Docker Images ke GHCR
  # Hanya jalan jika push ke branch 'main' dan test sukses
  # ─────────────────────────────────────────────
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login ke GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build & Push Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  # ─────────────────────────────────────────────
  # 3. Deploy ke VPS via SSH
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy ke VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code (untuk docker-compose.yml terbaru)
        uses: actions/checkout@v4

      - name: Copy docker-compose.yml ke server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yml"
          target: "~/design-studio"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ~/design-studio

            # Login ke GHCR agar bisa pull image private
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin 2>/dev/null

            # Pull image terbaru dari GHCR
            BACKEND_IMAGE=${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
            FRONTEND_IMAGE=${{ env.FRONTEND_IMAGE }}:${{ github.sha }} \
              docker compose pull backend frontend celery

            # Restart containers dengan image baru
            BACKEND_IMAGE=${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
            FRONTEND_IMAGE=${{ env.FRONTEND_IMAGE }}:${{ github.sha }} \
              docker compose up -d --remove-orphans

            # Jalankan database migrations
            docker compose exec -T backend alembic upgrade head

            echo "✅ Deploy selesai! Commit: ${{ github.sha }}"

  # ─────────────────────────────────────────────
  # 4. Auto Tag Release (Semantic Versioning)
  # ─────────────────────────────────────────────
  auto-tag:
    name: Auto Tag Release
    runs-on: ubuntu-latest
    needs: deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: '0'

      - name: Bump version and push tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: minor
          release_branches: main
